<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #111111;
    --bg-elev-2: #161616;
    --border: #1f1f1f;
    --border-strong: #2a2a2a;
    --fg: #ededed;
    --fg-muted: #8a8a8a;
    --fg-dim: #5a5a5a;
    --accent: #10b981;
    --accent-dim: #10b9811a;
    --accent-soft: #10b98133;
    --danger: #ef4444;
    --warn: #f59e0b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings: 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* subtle grid bg */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, #ffffff04 1px, transparent 1px),
      linear-gradient(to bottom, #ffffff04 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  /* ambient glow */
  body::after {
    content: "";
    position: fixed;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, #10b98114 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    filter: blur(40px);
  }

  #root { position: relative; z-index: 1; }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }

  /* animations */
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  @keyframes type-cursor {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes orbit-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes ai-input-pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1; }
  }
  @keyframes ai-placeholder-fade {
    0%, 100% { opacity: 0.75; }
    50%      { opacity: 1; }
  }
  @keyframes ai-hint-bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-5px); }
  }

  .fade-in { animation: fade-in-up 0.4s cubic-bezier(.2,.7,.2,1) both; }
  .ai-input-pulse-on {
    position: relative;
  }
  .ai-input-pulse-on::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 20px;
    border: 3px solid #10b981;
    pointer-events: none;
    animation: ai-input-pulse 1.8s ease-in-out infinite;
    will-change: opacity;
  }
  .ai-input-pulse-on .ai-prompt-textarea::placeholder {
    animation: ai-placeholder-fade 1.8s ease-in-out infinite;
  }
  .ai-input-pulse-on .ai-caret-blink {
    animation: type-cursor 1s steps(2) infinite;
  }
  .ai-prompt-textarea::placeholder {
    color: var(--fg-muted);
    opacity: 0.85;
  }
  .ai-hint-bubble {
    animation: ai-hint-bounce 1.6s ease-in-out infinite;
  }

  /* focus ring */
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* tooltip */
  .tt-wrap { position: relative; }
  .tt-bubble {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: #161616;
    color: var(--fg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.5;
    white-space: normal;
    width: max-content;
    max-width: 260px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 50;
    box-shadow: 0 8px 24px -8px #000;
  }
  .tt-bubble::after {
    content: "";
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #161616;
  }
  .tt-wrap:hover .tt-bubble,
  .tt-wrap:focus-within .tt-bubble {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* responsive */
  .main-wrap { padding: 20px 24px 40px; }
  .chat-spacer { display: none; }

  @media (max-width: 720px) {
    .header { padding: 28px 16px 16px !important; }
    .header h1 { font-size: 44px !important; }
    .main-wrap { padding: 12px 14px 24px; }
    .demo-stage { aspect-ratio: 4 / 5 !important; max-width: 100% !important; }
    .footer { padding: 0 16px !important; }
    .footer-row {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 16px !important;
    }
    .skills-grid { grid-template-columns: 1fr !important; }
    .skills-section { padding: 24px 16px 0 !important; }

    /* fixed bottom chat */
    .chat-dock {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 10px 12px 12px;
      background: linear-gradient(180deg, transparent, #0a0a0a 30%);
      z-index: 40;
      backdrop-filter: blur(8px);
    }
    .chat-dock .suggestions { display: none; }
    .chat-spacer { display: block; height: 120px; }
    .console-area { margin-top: 12px !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>
